name: Deploy Mini Program

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Install miniprogram-ci
        run: npm install miniprogram-ci
        
      - name: Upload to WeChat Mini Program
        run: node scripts/upload.js
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}

      - name: Upload QR Code
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: preview-qrcode
          path: scripts/preview-qrcode.png
          retention-days: 7
